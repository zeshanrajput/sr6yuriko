project:
  type: book
  output-dir: _book
  pre-render: uv run python scripts/main.py "input/Yuriko Star v9.xml" --output "output/character_sheet.txt"

book:
  title: "REIKO // Yuriko Star Portfolio"
  author: "Reiko"
  date: "2026-06-17"
  chapters:
    - index.qmd
    - part: "Core Character"
      chapters:
        - chapters/identity_core.qmd
        - chapters/character_sheet.qmd
        - chapters/rules_and_downtime.qmd
        - chapters/character_log.qmd
        - chapters/twenty_questions.qmd
    - part: "Background Stories"
      chapters:
        - chapters/01 The Weight of Zero.md
        - chapters/02 Color Blind Mathematics.md
        - chapters/03 The Soul Broker's Stall.md
        - chapters/04 The War Crime.md
        - chapters/05 A SINner's Loan.md
        - chapters/06 The Ghost in the Ledger.md
        - chapters/07 Sunday at r3sP@wn.md
    - part: "Out-of-Session Narratives"
      chapters:
        - chapters/08 Abandoning Tourism.md
        - chapters/09 Triangulation.md
        - chapters/10 Game Theory.md
        - chapters/11 Integrating over Infinity.md
        - chapters/12 Defrag.md
        - chapters/13 Field Trip.md
        - chapters/14 A Point of Favor.md
        - chapters/15 Core.md

format:
  html:
    theme:
      - cosmo
      - theme.scss
    toc: true
    number-sections: false
    code-copy: true
